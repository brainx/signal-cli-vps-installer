name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt systemd

      - name: Run checks
        run: ./scripts/check.sh

  validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:12
          - ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          apt-get update
          apt-get install -y bash ca-certificates coreutils findutils grep tar

      - name: Run validation tests
        run: tests/run-tests.sh
